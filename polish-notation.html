<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <title>3記法変換ツール</title>
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, max-image-preview:none, max-video-preview:0, noimageindex, unavailable-after:Thu, 24 Nov 2022 00:00:00 +0900">
    <style>
        :root {
            --theme: #33cc35;
            --theme-reverse: #cc33ca;
        }

        body {
            font-family: 'Segoe UI Variable Text', 'Courier New', monospace;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 10px 10px 10px 0px color-mix(in srgb, var(--theme), transparent 35%);
        }

        h1 {
            color: #333;
            border-bottom: 3px solid var(--theme);
            padding-bottom: 10px;
        }

        h2 {
            color: #333;
        }

        .mode-selection {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .mode-selection label {
            display: flex;
            align-items: center;
            gap: 0px;
            white-space: nowrap;
        }

        #expression {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 4px;
            background: white;
            line-height: 1.2;
            max-height: calc(1.2*16*10);
            resize: none;
            text-wrap: wrap;
            display: block;
            word-break: break-all;
            overflow-y: hidden;
            box-sizing: border-box;
            color: #333;
        }

        #expression::-webkit-scrollbar,
        .tree-display::-webkit-scrollbar {
            width: 13px;
            height: 13px;
        }

        #expression::-webkit-scrollbar-track,
        .tree-display::-webkit-scrollbar-track {
            background: transparent;
        }

        #expression::-webkit-scrollbar-thumb,
        .tree-display::-webkit-scrollbar-thumb {
            background-color: var(--theme);
            background-clip: padding-box;
            border: 3px solid transparent;
            border-radius: 10px;
            transition: background-color 0.5s;
        }

        #expression::-webkit-scrollbar-thumb:hover,
        .tree-display::-webkit-scrollbar-thumb:hover {
            background-color: color-mix(in srgb, var(--theme), transparent 50%);
        }

        .result {
            margin: 20px 0;
            padding: 15px;
            background: #f9f9f9;
            border-left: 4px solid var(--theme);
            color: #333;
        }

        .result hr {
            margin: 15px 0;
            border: none;
            border-top: 1px solid #ddd;
        }

        .result ol {
            margin: 5px 0;
            padding-left: 25px;
        }

        .result pre {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.6;
            font-family: 'Consolas', 'Monaco', monospace;
            color: #333;
            margin: 10px 0;
        }

        .conversion-title {
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        .tree-display {
            margin: 20px 0;
            padding: 15px;
            background: #fff;
            border: 1px solid #ddd;
            font-family: 'MS Gothic';
            font-size: 10pt;
            white-space: pre;
            overflow-x: auto;
            color: #333;
        }

        .test-cases {
            margin-top: 30px;
        }

        .test-case {
            margin: 10px 0;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 4px;
            color: #333;
        }

        .error {
            color: #f00;
            font-weight: bold;
        }

        .success {
            color: #2e7d32;
            font-weight: bold;
        }

        label {
            cursor: pointer;
            color: #333;
        }

        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border: 2px solid #ddd;
            outline: none;
            border-radius: 50%;
            margin-right: 8px;
            display: grid;
            place-content: center;
            background: #e0e0e0;
            transition: border-color 0.25s ease-in-out;
            cursor: pointer;
        }

        input[type="radio"]:checked {
            border: 2px solid color-mix(in srgb, var(--theme), #e0e0e0 15%);
        }

        input[type="radio"]::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.25s ease-in-out;
            background-color: var(--theme);
            box-shadow: inset 1px 1px 1px rgba(0, 0, 0, 0.1);
        }

        input[type="radio"]:checked::before {
            transform: scale(1);
        }

        input[type="radio"]:hover {
            border-color: var(--theme-reverse);
        }

        input[type="radio"]:focus-visible {
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--theme-reverse), transparent 25%);
        }

        @media (prefers-color-scheme: dark) {
            input[type="radio"] {
                background: #2d2d2d;
                border-color: #666;
            }

            input[type="radio"]:checked {
                border: 2px solid color-mix(in srgb, var(--theme), #2d2d2d 15%);
            }

            body {
                background: #1a1a1a;
            }

            .container {
                background: #2d2d2d;
            }

            h1 {
                color: #e0e0e0;
                border-bottom-color: var(--theme);
            }

            h2 {
                color: #e0e0e0;
            }

            #expression {
                background: #3d3d3d;
                color: #e0e0e0;
                border-color: #555;
            }

            .result {
                background: #3d3d3d;
                border-left-color: var(--theme);
                color: #e0e0e0;
            }

            .result hr {
                border-top-color: #555;
            }

            .result pre {
                background: #2a2a2a;
                color: #e0e0e0;
            }

            .tree-display {
                background: #3d3d3d;
                border-color: #555;
                color: #e0e0e0;
            }

            .error {
                color: #f22;
                font-weight: bold;
            }

            .success {
                color: var(--theme);
            }

            label {
                color: #e0e0e0;
            }
        }

        @media (prefers-contrast: more) {
            :root {
                --theme: #008502;
                --theme-reverse: #850082;
            }

            body {
                background: #fff;
            }

            .container {
                border: 2px solid #000;
                box-shadow: none !important;
            }

            h1,
            h2,
            label,
            .result,
            #expression {
                color: #000 !important;
            }

            #expression {
                border: 2px solid #000;
            }

            input[type="radio"] {
                border: 2px solid #000;
                background: #fff;
            }

            input[type="radio"]:checked {
                border-color: #000;
                background: #fff;
            }

            input[type="radio"]:checked::before {
                background-color: #000;
                transform: scale(0.8);
            }

            .result {
                background: #fff;
                border: 3px solid #000;
                border-left-width: 10px;
            }

            .result pre {
                background: #f5f5f5;
                color: #000;
                border: 1px solid #000;
            }

            .tree-display {
                border: 2px solid #000;
                background: #fff;
            }

            .error {
                color: #b00 !important;
                text-decoration: underline;
            }

            .success {
                color: #006400 !important;
                text-decoration: double underline;
            }

            #expression::-webkit-scrollbar-thumb,
            .tree-display::-webkit-scrollbar-thumb {
                background-color: #000 !important;
                border: 1px solid #fff;
            }
        }

        @media (prefers-contrast: more) and (prefers-color-scheme: dark) {
            body {
                background: #000;
            }

            .container {
                border-color: #fff;
                background: #000;
            }

            h1,
            h2,
            label,
            .result,
            #expression,
            .tree-display {
                color: #fff !important;
            }

            #expression,
            .tree-display {
                border-color: #fff;
                background: #000;
            }

            input[type="radio"] {
                border-color: #fff;
                background: #000;
            }

            input[type="radio"]:checked::before {
                background-color: #fff;
            }

            .result {
                border-color: #fff;
                background: #000;
            }

            .result pre {
                background: #1a1a1a;
                color: #fff;
                border-color: #fff;
            }

            .success {
                color: #0f0 !important;
            }

            .error {
                color: #f55 !important;
            }
        }

        *,
        *::before,
        *::after {
            transition:
                color 0.25s ease-in-out,
                background-color 0.25s ease-in-out,
                border-color 0.25s ease-in-out,
                box-shadow 0.25s ease-in-out,
                text-decoration-color 0.25s ease-in-out,
                outline-color 0.25s ease-in-out;
        }

        ::-webkit-scrollbar-thumb {
            transition: background-color 0.25s ease-in-out;
        }

        .tree-display,
        .result,
        #expression {
            transition: inherit;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>3記法変換ツール</h1>

        <div class="input-section">
            <div class="mode-selection">
                <label>
                    <input type="radio" name="mode" value="infix" checked onchange="changeMode()"> 中置記法 (例: 1+2*3)
                </label>
                <label>
                    <input type="radio" name="mode" value="polish" onchange="changeMode()"> ポーランド記法 (例: + 1 * 2 3)
                </label>
                <label>
                    <input type="radio" name="mode" value="rpn" onchange="changeMode()"> 逆ポーランド記法 (例: 1 2 3 * +)
                </label>
            </div>
            <textarea id="expression" rows="1" placeholder="例: 1 + 2 * 3" oninput="buildTree()"></textarea>
        </div>

        <div id="result"></div>
        <div id="treeDisplay"></div>
    </div>

    <script>
        class Node {
            constructor(exp, left = null, right = null) {
                this.exp = exp;
                this.left = left;
                this.right = right;
            }
        }

        function changeMode() {
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const input = document.getElementById('expression');
            const resultEl = document.getElementById('result');
            const treeEl = document.getElementById('treeDisplay');

            const placeholders = {
                infix: '例: 1 + 2 * 3',
                polish: '例: + 1 * 2 3',
                rpn: '例: 1 2 3 * +'
            };

            input.placeholder = placeholders[mode];
            input.value = '';
            resultEl.innerHTML = '';
            treeEl.innerHTML = '';
        }

        const OPS = ['+', '-', '*', '/', '%'];

        function makeTree(str) {
            str = str.replace(/\s+/g, '');
            if (!str) return null;

            let pos = -1;
            for (const opGroup of [['+', '-'], ['*', '/', '%']]) {
                for (let i = str.length - 1; i >= 0; i--) {
                    if (opGroup.includes(str[i])) {
                        pos = i;
                        break;
                    }
                }
                if (pos !== -1) break;
            }

            if (pos !== -1) {
                return new Node(
                    str[pos],
                    makeTree(str.substring(0, pos)),
                    makeTree(str.substring(pos + 1))
                );
            }
            return new Node(str);
        }

        function polishToTree(tokens) {
            if (tokens.length === 0) return null;
            const token = tokens.shift();
            const node = new Node(token);

            if (OPS.includes(token)) {
                node.left = polishToTree(tokens);
                node.right = polishToTree(tokens);
            }
            return node;
        }

        function rpnToTree(tokens) {
            const stack = [];
            for (const token of tokens) {
                if (OPS.includes(token)) {
                    const right = stack.pop();
                    const left = stack.pop();
                    stack.push(new Node(token, left, right));
                } else {
                    stack.push(new Node(token));
                }
            }
            return stack[0] || null;
        }

        const printTree = (node) =>
            !node ? '' : `${node.exp} ${printTree(node.left)} ${printTree(node.right)}`.trim();

        const printInfix = (node) => {
            if (!node) return '';
            if (!OPS.includes(node.exp)) return node.exp;
            return `${printInfix(node.left)}${node.exp}${printInfix(node.right)}`;
        };

        const printRPN = (node) => 
            !node ? '' : `${printRPN(node.left)} ${printRPN(node.right)} ${node.exp}`.trim();

        function getConversionSteps(tree, fromMode, toMode, originalExpr) {
            const steps = [];
            
            if (fromMode === 'infix' && toMode === 'polish') {
                steps.push(`入力式: ${originalExpr}`);
                steps.push('');
                steps.push('1. 中置記法から構文木を構築');
                steps.push('   演算子の優先順位に従って解析');
                addTreeBuildSteps(tree, steps, '   ', originalExpr);
                steps.push('');
                steps.push('2. 前置順走査 (根→左→右)');
                addPreorderSteps(tree, steps, '   ');
                steps.push('');
                steps.push(`3. 結果: ${printTree(tree)}`);
            } else if (fromMode === 'infix' && toMode === 'rpn') {
                steps.push(`入力式: ${originalExpr}`);
                steps.push('');
                steps.push('1. 中置記法から構文木を構築');
                steps.push('   演算子の優先順位に従って解析');
                addTreeBuildSteps(tree, steps, '   ', originalExpr);
                steps.push('');
                steps.push('2. 後置順走査 (左→右→根)');
                addPostorderSteps(tree, steps, '   ');
                steps.push('');
                steps.push(`3. 結果: ${printRPN(tree)}`);
            } else if (fromMode === 'polish' && toMode === 'infix') {
                steps.push(`入力式: ${originalExpr}`);
                steps.push('');
                steps.push('1. ポーランド記法から構文木を構築');
                steps.push('   トークンを前から読み、再帰的に処理');
                addPolishParseSteps(tree, steps, '   ');
                steps.push('');
                steps.push('2. 中置順走査 (左→根→右)');
                addInorderSteps(tree, steps, '   ');
                steps.push('');
                steps.push(`3. 結果: ${printInfix(tree)}`);
            } else if (fromMode === 'polish' && toMode === 'rpn') {
                steps.push(`入力式: ${originalExpr}`);
                steps.push('');
                steps.push('1. ポーランド記法から構文木を構築');
                addPolishParseSteps(tree, steps, '   ');
                steps.push('');
                steps.push('2. 後置順走査 (左→右→根)');
                addPostorderSteps(tree, steps, '   ');
                steps.push('');
                steps.push(`3. 結果: ${printRPN(tree)}`);
            } else if (fromMode === 'rpn' && toMode === 'infix') {
                steps.push(`入力式: ${originalExpr}`);
                steps.push('');
                steps.push('1. 逆ポーランド記法から構文木を構築');
                steps.push('   スタックを使用して処理');
                addRPNParseSteps(tree, steps, '   ');
                steps.push('');
                steps.push('2. 中置順走査 (左→根→右)');
                addInorderSteps(tree, steps, '   ');
                steps.push('');
                steps.push(`3. 結果: ${printInfix(tree)}`);
            } else if (fromMode === 'rpn' && toMode === 'polish') {
                steps.push(`入力式: ${originalExpr}`);
                steps.push('');
                steps.push('1. 逆ポーランド記法から構文木を構築');
                addRPNParseSteps(tree, steps, '   ');
                steps.push('');
                steps.push('2. 前置順走査 (根→左→右)');
                addPreorderSteps(tree, steps, '   ');
                steps.push('');
                steps.push(`3. 結果: ${printTree(tree)}`);
            }
            
            return steps;
        }

        function addTreeBuildSteps(node, steps, prefix, originalExpr) {
            if (!node) return;
            steps.push(`${prefix}解析中: ${originalExpr}`);
            if (OPS.includes(node.exp)) {
                steps.push(`${prefix}演算子 "${node.exp}" を根とする部分木を作成`);
                if (node.left) {
                    steps.push(`${prefix}  左部分木: ${printInfix(node.left)}`);
                }
                if (node.right) {
                    steps.push(`${prefix}  右部分木: ${printInfix(node.right)}`);
                }
            }
        }

        function addPolishParseSteps(node, steps, prefix) {
            const tokens = printTree(node).split(' ');
            steps.push(`${prefix}トークン列: [${tokens.join(', ')}]`);
            steps.push('');
            let index = 0;
            
            function parseStep(n, depth = 0) {
                if (!n) return;
                const indent = prefix + '  '.repeat(depth);
                if (OPS.includes(n.exp)) {
                    steps.push(`${indent}[位置${index}] "${n.exp}" (演算子) → 左右の部分木を構築`);
                    index++;
                    parseStep(n.left, depth + 1);
                    parseStep(n.right, depth + 1);
                } else {
                    steps.push(`${indent}[位置${index}] "${n.exp}" (オペランド) → 葉ノード作成`);
                    index++;
                }
            }
            parseStep(node);
        }

        function addRPNParseSteps(node, steps, prefix) {
            const tokens = printRPN(node).split(' ');
            steps.push(`${prefix}トークン列: [${tokens.join(', ')}]`);
            steps.push(`${prefix}初期スタック: []`);
            steps.push('');
            const stack = [];
            
            for (let i = 0; i < tokens.length; i++) {
                const token = tokens[i];
                if (OPS.includes(token)) {
                    const r = stack.pop();
                    const l = stack.pop();
                    const combined = `(${l}${token}${r})`;
                    stack.push(combined);
                    steps.push(`${prefix}[位置${i}] "${token}" (演算子)`);
                    steps.push(`${prefix}    pop: ${r}, ${l}`);
                    steps.push(`${prefix}    計算: ${l} ${token} ${r}`);
                    steps.push(`${prefix}    push: ${combined}`);
                    steps.push(`${prefix}    スタック: [${stack.join(', ')}]`);
                } else {
                    stack.push(token);
                    steps.push(`${prefix}[位置${i}] "${token}" (オペランド)`);
                    steps.push(`${prefix}    push: ${token}`);
                    steps.push(`${prefix}    スタック: [${stack.join(', ')}]`);
                }
                if (i < tokens.length - 1) steps.push('');
            }
        }

        function addPreorderSteps(node, steps, prefix, path = []) {
            if (!node) return;
            path.push(node.exp);
            steps.push(`${prefix}訪問: ${node.exp}`);
            steps.push(`${prefix}    現在の出力: [${path.join(', ')}]`);
            addPreorderSteps(node.left, steps, prefix, path);
            addPreorderSteps(node.right, steps, prefix, path);
        }

        function addInorderSteps(node, steps, prefix, path = []) {
            if (!node) return;
            addInorderSteps(node.left, steps, prefix, path);
            path.push(node.exp);
            steps.push(`${prefix}訪問: ${node.exp}`);
            steps.push(`${prefix}    現在の出力: ${path.join('')}`);
            addInorderSteps(node.right, steps, prefix, path);
        }

        function addPostorderSteps(node, steps, prefix, path = []) {
            if (!node) return;
            addPostorderSteps(node.left, steps, prefix, path);
            addPostorderSteps(node.right, steps, prefix, path);
            path.push(node.exp);
            steps.push(`${prefix}訪問: ${node.exp}`);
            steps.push(`${prefix}    現在の出力: [${path.join(', ')}]`);
        }

        function buildTree() {
            const input = document.getElementById('expression');

            input.style.height = 'auto';
            const lineHeight = 19.2;
            const maxHeight = lineHeight * 10;

            if (input.scrollHeight > maxHeight) {
                input.style.height = maxHeight + 'px';
                input.style.overflowY = 'auto';
            } else {
                input.style.height = Math.max(input.scrollHeight, 44) + 'px';
                input.style.overflowY = 'hidden';
            }

            let expr = input.value;
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const resultEl = document.getElementById('result');
            const treeEl = document.getElementById('treeDisplay');

            if (/[^0-9+\-*/% \u3000]/.test(expr)) {
                resultEl.innerHTML = '<p class="error">エラー: 使用できない文字が含まれています</p>';
                treeEl.innerHTML = '';
                return;
            }

            if (!expr.trim()) {
                resultEl.innerHTML = '<p class="error">数式を入力してください</p>';
                treeEl.innerHTML = '';
                return;
            }

            let tree;
            if (mode === 'infix') {
                tree = makeTree(expr);
            } else if (mode === 'polish') {
                tree = polishToTree(expr.trim().split(/\s+/));
            } else {
                tree = rpnToTree(expr.trim().split(/\s+/));
            }

            const polish = printTree(tree);
            const infix = printInfix(tree);
            const rpn = printRPN(tree);

            const modeNames = {
                infix: '中置記法',
                polish: 'ポーランド記法',
                rpn: '逆ポーランド記法'
            };

            let conversionSteps = '';
            
            if (mode === 'infix') {
                const stepsToPolish = getConversionSteps(tree, 'infix', 'polish', expr);
                const stepsToRPN = getConversionSteps(tree, 'infix', 'rpn', expr);
                
                conversionSteps = `
                    <p class="conversion-title">変換手順 (中置→ポーランド):</p>
                    <pre>${stepsToPolish.join('\n')}</pre>
                    <p class="conversion-title">変換手順 (中置→逆ポーランド):</p>
                    <pre>${stepsToRPN.join('\n')}</pre>`;
            } else if (mode === 'polish') {
                const stepsToInfix = getConversionSteps(tree, 'polish', 'infix', expr);
                const stepsToRPN = getConversionSteps(tree, 'polish', 'rpn', expr);
                
                conversionSteps = `
                    <p class="conversion-title">変換手順 (ポーランド→中置):</p>
                    <pre>${stepsToInfix.join('\n')}</pre>
                    <p class="conversion-title">変換手順 (ポーランド→逆ポーランド):</p>
                    <pre>${stepsToRPN.join('\n')}</pre>`;
            } else {
                const stepsToInfix = getConversionSteps(tree, 'rpn', 'infix', expr);
                const stepsToPolish = getConversionSteps(tree, 'rpn', 'polish', expr);
                
                conversionSteps = `
                    <p class="conversion-title">変換手順 (逆ポーランド→中置):</p>
                    <pre>${stepsToInfix.join('\n')}</pre>
                    <p class="conversion-title">変換手順 (逆ポーランド→ポーランド):</p>
                    <pre>${stepsToPolish.join('\n')}</pre>`;
            }

            resultEl.innerHTML = `
        <div class="result">
            <p><strong>入力モード:</strong> ${modeNames[mode]}</p>
            <p><strong>中置記法:</strong> <span class="success">${infix}</span></p>
            <p><strong>ポーランド記法:</strong> <span class="success">${polish}</span></p>
            <p><strong>逆ポーランド記法:</strong> <span class="success">${rpn}</span></p>
            <hr>
            ${conversionSteps}
        </div>`;

            treeEl.innerHTML = `<div class="tree-display">${visualizeTree(tree)}</div>`;
        }

        function visualizeTree(node, prefix = '', isLeft = true) {
            if (!node) return '';
            let res = `${prefix}${isLeft ? '├── ' : '└── '}${node.exp}\n`;
            const newPrefix = prefix + (isLeft ? '│   ' : '    ');
            if (node.left || node.right) {
                res += visualizeTree(node.left, newPrefix, true);
                res += visualizeTree(node.right, newPrefix, false);
            }
            return res;
        }
    </script>
</body>

</html>
