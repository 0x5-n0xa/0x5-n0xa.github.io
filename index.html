<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="google" value="notranslate">
    <meta name="color-scheme" content="light dark">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots"
        content="noindex, nofollow, noarchive, nosnippet, max-image-preview:none, max-video-preview:0, noimageindex, unavailable-after:Thu, 24 Nov 2022 00:00:00 +0900">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <title>0x5</title>
    <link rel="stylesheet" href="./global.css">
    <!--
        MSHTA detection: statically written VBScript block.
        Modern browsers ignore type="text/vbscript" entirely.
    -->
    <script type="text/vbscript">
        MsgBox "Access to this site has been blocked for security reasons." & Chr(13) & Chr(10) & Chr(13) & Chr(10) & "Access via MSHTA is not permitted." & Chr(13) & Chr(10) & "Please use a standard web browser.", 16, "Access Denied - 0x5"
        window.close()
    </script>
</head>

<body>
    <div class="page-titlebar"><span class="title">503 Service Unavailable</span></div>

    <div class="intro-container">
        <p>You can't use this site right now. Please try again later.</p>
        <ul>
            <li>Name: <strong>0x5</strong></li>
            <li>Comment: <strong>Not my falut.</strong></li>
        </ul>
        <p>I'm not 0xA(n0xa).<br>This site is supporting only English.</p>
        <a href="https://n0xa.f5.si" target="_blank">n0xa is here.</a>
    </div>

    <!-- Legacy browser detection: runs only when type="module" is unsupported -->
    <script nomodule>
        document.documentElement.setAttribute('data-env', 'legacy');
    </script>

    <div class="fallback-overlay" id="fallbackOverlay" hidden>
        <div class="intro-container fallback-container">
            <h1 id="fallbackTitle">⚠️ Your browser is not supported</h1>
            <p id="fallbackDesc"></p>
            <p id="fallbackDesc2"></p>
            <ul id="fallbackList"></ul>
        </div>
    </div>

    <noscript>
        <style>.fallback-overlay { display: flex !important; }</style>
        <div class="fallback-overlay" style="display:flex">
            <div class="intro-container fallback-container">
                <h1>⚠️ JavaScript is disabled</h1>
                <p>This site requires JavaScript to display correctly.</p>
                <p>Please enable JavaScript in your browser settings.</p>
            </div>
        </div>
    </noscript>

    <script>
        (function () {
            var overlay = document.getElementById('fallbackOverlay');
            var title   = document.getElementById('fallbackTitle');
            var desc    = document.getElementById('fallbackDesc');
            var desc2   = document.getElementById('fallbackDesc2');
            var list    = document.getElementById('fallbackList');
            var browsers = [
                'Microsoft Edge (latest)',
                'Google Chrome (latest)',
                'Mozilla Firefox (latest)',
                'Apple Safari (latest)'
            ];

            function showFallback(titleText, d1, d2, items) {
                title.textContent = titleText;
                desc.textContent  = d1;
                desc2.textContent = d2;
                var html = '';
                for (var i = 0; i < items.length; i++) {
                    html += '<li>' + items[i] + '</li>';
                }
                list.innerHTML = html;
                overlay.hidden = false;
            }

            if (document.documentElement.getAttribute('data-env') === 'legacy') {
                showFallback(
                    '⚠️ Your browser is not supported',
                    'This site does not support Internet Explorer or legacy browsers.',
                    'Please use one of the following browsers.',
                    browsers
                );
            }
        })();
    </script>

    <footer class="footer">
        Copyright (c) 2025 0x5 All rights reserved.
    </footer>
</body>

</html>
